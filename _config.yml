title: Mehrdad Zaker
description: Industry guidance, IDX dashboard workflows, private AI deployment, and custom AI systems.
baseurl: ""
url: "https://www.mehrdadzaker.com"
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  math_engine_opts:
    preview: true

# Minimal Mistakes (GitHub Pages compatible)
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"
plugins:
  - jekyll-include-cache
  - jekyll-sitemap

exclude:
  - .bundle/
  - Gemfile
  - Gemfile.lock
  - gemfiles/
  - MythosBridge/
  - node_modules/
  - README.md
  - vendor/

collections:
  podcast_entries:
    output: true
    permalink: /podcast/:name/
  newsletter_entries:
    output: true
    permalink: /newsletter/:name/
  resource_guides:
    output: true
    permalink: /resources/:name/

defaults:
  - scope:
      path: ""
      type: podcast_entries
    values:
      layout: podcast_entry
      classes: wide podcast-entry-page
  - scope:
      path: ""
      type: newsletter_entries
    values:
      layout: single
      classes: wide newsletter-entry-page
      toc: true
      toc_label: "In this issue"
  - scope:
      path: ""
      type: resource_guides
    values:
      layout: single
      classes: wide resource-entry-page
      toc: true
      toc_label: "In this guide"
      resource_guide: true

# Site features
search: false

# Site-specific settings
contact_email: "mehrdadz@neuralint.io"
logo_mark: "/assets/images/logo-mark.svg"
default_social_image: "/assets/images/private-ai-consulting-header-1200.png"

# Lead capture + demo chat (set these)
leads_endpoint: ""
turnstile_site_key: ""

# Newsletter (Substack) (set this)
substack_subscribe_url: ""
