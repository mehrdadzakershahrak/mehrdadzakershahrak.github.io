<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic IDX search and review workspace</title>
  <desc id="desc">A synthetic product proof visual showing search results, matched excerpts, and viewer-linked review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe3"/>
      <stop offset="1" stop-color="#e4ece8"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17342c" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect x="58" y="54" width="844" height="492" rx="22" fill="#fffdf8" stroke="#d8cab7" filter="url(#shadow)"/>
  <rect x="96" y="96" width="768" height="58" rx="18" fill="#203f39"/>
  <text x="126" y="132" fill="#fff8e8" font-family="Arial, sans-serif" font-size="18">Search packet: "termination notice"</text>
  <rect x="96" y="190" width="360" height="92" rx="16" fill="#eef5ee" stroke="#c8d8cb"/>
  <text x="120" y="224" fill="#203f39" font-family="Arial, sans-serif" font-size="16" font-weight="700">Result 1 - renewal addendum</text>
  <text x="120" y="250" fill="#4f6157" font-family="Arial, sans-serif" font-size="14">Matched excerpt with page 9 viewer link</text>
  <rect x="312" y="236" width="92" height="28" rx="14" fill="#203f39"/>
  <text x="336" y="255" fill="#fff8e8" font-family="Arial, sans-serif" font-size="12">Page 9</text>
  <rect x="96" y="306" width="360" height="92" rx="16" fill="#fffaf0" stroke="#dccfb8"/>
  <text x="120" y="340" fill="#203f39" font-family="Arial, sans-serif" font-size="16" font-weight="700">Result 2 - master terms</text>
  <text x="120" y="366" fill="#4f6157" font-family="Arial, sans-serif" font-size="14">Prior notice window for comparison</text>
  <rect x="312" y="352" width="96" height="28" rx="14" fill="#f1e4ce" stroke="#d2b987"/>
  <text x="336" y="371" fill="#5f4b24" font-family="Arial, sans-serif" font-size="12">Page 31</text>
  <rect x="512" y="190" width="304" height="258" rx="18" fill="#fdfbf5" stroke="#d8cab7"/>
  <text x="542" y="228" fill="#203f39" font-family="Georgia, serif" font-size="25">Viewer-linked review</text>
  <rect x="542" y="266" width="214" height="12" rx="6" fill="#d8cab7"/>
  <rect x="542" y="290" width="236" height="12" rx="6" fill="#d8cab7"/>
  <rect x="542" y="314" width="194" height="12" rx="6" fill="#d8cab7"/>
  <rect x="542" y="352" width="220" height="48" rx="10" fill="#fff3cf" stroke="#deb758"/>
  <text x="564" y="382" fill="#4a3d1f" font-family="Arial, sans-serif" font-size="14" font-weight="700">Matched text stays inspectable</text>
  <path d="M408 250 C472 250, 472 376, 542 376" fill="none" stroke="#d18b2f" stroke-width="5" stroke-linecap="round"/>
  <text x="96" y="500" fill="#6f786f" font-family="Arial, sans-serif" font-size="13">Synthetic/redacted demo visual. Replace with a live product screenshot when approved.</text>
</svg>
