<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Technical schematic showing a private AI workflow from private data to LLM engine to verified output">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f343b"/>
      <stop offset="100%" stop-color="#1d2329"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(22,29,35,0.96)"/>
      <stop offset="100%" stop-color="rgba(12,17,22,0.98)"/>
    </linearGradient>
    <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27d0cb"/>
      <stop offset="50%" stop-color="#00b8b5"/>
      <stop offset="100%" stop-color="#77f2ee"/>
    </linearGradient>
    <linearGradient id="glowFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,128,128,0.28)"/>
      <stop offset="100%" stop-color="rgba(0,128,128,0.08)"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.045)" stroke-width="1"/>
    </pattern>
  </defs>

