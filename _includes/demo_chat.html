<div
  class="demo-chat"
  data-demo-chat
  data-demo-id="{{ page.demo_id | escape }}"
>
  <div class="demo-chat__header">
    <div>
      <strong>Try it</strong>
      <div class="demo-chat__status" data-demo-chat-status></div>
    </div>
    <div class="demo-chat__actions">
      <button type="button" class="btn btn--small" data-demo-chat-reset>Reset</button>
    </div>
  </div>

  <div class="demo-chat__body" data-demo-chat-body>
    <div class="demo-chat__msg">
      <div class="demo-chat__bubble" data-demo-chat-initial>
        Checking sign-in status…
      </div>
    </div>
  </div>

  <div class="demo-chat__gate" data-demo-chat-gate hidden>
    <strong>Sign in required</strong>
    <p data-demo-chat-gate-msg>Sign in with Google to use this demo.</p>
    <div class="demo-chat__actions">
      <a class="btn btn--primary" href="{{ '/login/' | relative_url }}" data-demo-chat-login>Sign in with Google</a>
    </div>
  </div>

  <div class="demo-chat__footer" data-demo-chat-footer hidden>
    <textarea class="demo-chat__input" rows="2" placeholder="Type your question…" data-demo-chat-input></textarea>
    <div class="demo-chat__actions">
      <button type="button" class="btn btn--primary" data-demo-chat-send>Send</button>
    </div>
    <div></div>
    <div class="demo-chat__status" data-demo-chat-hint></div>
  </div>
</div>
