{% if page.resource_cta %}
  {% assign cta_url = page.resource_cta.url | default: "/contact/" %}
  <section class="eh-cta-panel" aria-label="Related implementation path">
    <div>
      <p class="eh-eyebrow">Implementation path</p>
      <h2>{{ page.resource_cta.title }}</h2>
      <p>{{ page.resource_cta.copy }}</p>
    </div>
    <a class="eh-btn" href="{{ cta_url | relative_url }}">{{ page.resource_cta.label | default: "Start here" }}</a>
  </section>
{% endif %}
