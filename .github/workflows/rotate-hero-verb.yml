name: Rotate Hero Verb

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: rotate-hero-verb
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Add scheduled jitter
        if: github.event_name == 'schedule'
        run: |
          delay="$(( RANDOM % 2400 ))"
          echo "Sleeping ${delay}s to vary commit time."
          sleep "$delay"

      - name: Rotate hero verb
        id: rotate
        run: |
          chance="0.30"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            chance="1.0"
          fi

          python3 tools/rotate_hero_verb.py --chance "$chance"

          current="$(python3 tools/rotate_hero_verb.py --current-verb)"
          echo "current=${current}" >> "$GITHUB_OUTPUT"

          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Ruby
        if: steps.rotate.outputs.changed == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        if: steps.rotate.outputs.changed == 'true'
        run: |
          gem install bundler -v 4.0.7
          bundle _4.0.7_ install --jobs 4 --retry 3

      - name: Set up Node
        if: steps.rotate.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.rotate.outputs.changed == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.rotate.outputs.changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run homepage checks
        if: steps.rotate.outputs.changed == 'true'
        run: npx playwright test tests/e2e/website.spec.js -g "homepage exposes the updated SEO title|custom-hero pages expose a single content h1"

      - name: Commit and push
        if: steps.rotate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Rotate hero verb to ${{ steps.rotate.outputs.current }}"
          git push origin HEAD:gh-pages
